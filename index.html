<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCMC - GTC Digital Workers Scope</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #F0EDE8; color: #1a1a1a; height: 100vh; overflow: hidden; user-select: text; }

  /* Topbar */
  #topbar { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: #FFFFFF; border-bottom: 1px solid #E2E0DC; display: flex; align-items: center; padding: 0 24px; gap: 20px; z-index: 100; }
  .topbar-logo { height: 36px; width: auto; object-fit: contain; display: block; max-width: 200px; }
  .topbar-logo-intelmatix { height: 22px; background: #1a1a1a; border-radius: 6px; padding: 3px 7px; }
  .topbar-divider { width: 1px; height: 28px; background: #E2E0DC; }
  #topbar .title { font-size: 13px; font-weight: 600; color: #1a1a1a; letter-spacing: 0.02em; }
  #topbar .spacer { flex: 1; }
  #lang-toggle { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 7px; padding: 5px 10px; border-radius: 8px; transition: background 0.15s; font-family: inherit; }
  #lang-toggle:hover { background: #F0EDE8; }
  #lang-toggle .globe { width: 18px; height: 18px; opacity: 0.6; flex-shrink: 0; }
  #lang-toggle .lang-text { font-size: 12px; font-weight: 600; color: #3a3835; letter-spacing: 0.04em; }
  #lang-toggle .lang-active { color: #1a1a1a; font-weight: 700; }
  #lang-toggle .lang-divider { color: #ccc; font-size: 11px; }
  #lang-toggle .lang-inactive { color: #b0ada8; font-weight: 500; }

  /* Tabs */
  #tab-bar { display: flex; align-items: center; gap: 4px; }
  .tab-btn { background: none; border: 1px solid #E2E0DC; border-radius: 6px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: #888; font-family: inherit; transition: all 0.15s; }
  .tab-btn:hover { background: #F0EDE8; color: #3a3835; }
  .tab-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

  /* Canvas */
  #canvas { position: fixed; top: 64px; left: 0; right: 0; bottom: 0; overflow-y: auto; overflow-x: hidden; }
  #canvas-inner { padding: 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; width: 100%; max-width: 1200px; margin: 0 auto; }

  /* Agent column */
  .agent-col { display: flex; flex-direction: column; height: 100%; }

  /* Agent header */
  .agent-header { border-radius: 12px 12px 0 0; padding: 24px 18px 20px; background: #FFFFFF; border: 1px solid #E2E0DC; border-bottom: none; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

  /* Per-agent header border colors */
  .ameen .agent-header  { border-color: #C0392B; }
  .salma .agent-header  { border-color: #185FA5; }
  .haris .agent-header  { border-color: #B07D2C; }
  .mashaer .agent-header{ border-color: #534AB7; }
  .rashid .agent-header { border-color: #0F6E56; }
  .muneera .agent-header{ border-color: #C9A84C; }

  /* Photo */
  .agent-photo-wrap { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; margin: 0 auto 12px; border: 2px solid #E2E0DC; }
  .agent-photo { width: 100%; height: 100%; object-fit: cover; object-position: center top; }

  /* Name & role */
  .agent-name { font-size: 15px; font-weight: 700; letter-spacing: 0.01em; margin-bottom: 4px; }
  .agent-role { font-size: 10px; font-weight: 600; opacity: 0.45; text-transform: uppercase; letter-spacing: 0.09em; }

  /* Per-agent name colors */
  .ameen .agent-name  { color: #c96b63; }
  .salma .agent-name  { color: #4a8fc7; }
  .haris .agent-name  { color: #c99a4a; }
  .mashaer .agent-name{ color: #7b74d4; }
  .rashid .agent-name { color: #2a9e7e; }
  .muneera .agent-name{ color: #b89a3a; }

  /* Summary strip */
  .agent-summary { font-size: 11px; color: #6a6865; line-height: 1.55; padding: 10px 14px; background: #FAFAF8; border-left: 1px solid #E2E0DC; border-right: 1px solid #E2E0DC; border-bottom: 1px solid #E2E0DC; text-align: left; height: 64px; display: flex; align-items: center; }

  /* Per-agent summary accent */
  .ameen .agent-summary  { border-left: 3px solid #C0392B; }
  .salma .agent-summary  { border-left: 3px solid #185FA5; }
  .haris .agent-summary  { border-left: 3px solid #B07D2C; }
  .mashaer .agent-summary{ border-left: 3px solid #534AB7; }
  .rashid .agent-summary { border-left: 3px solid #0F6E56; }
  .muneera .agent-summary{ border-left: 3px solid #C9A84C; }

  /* Task list */
  .task-list { background: #FFFFFF; border-left: 1px solid #E2E0DC; border-right: 1px solid #E2E0DC; padding: 10px 10px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .ameen .task-list  { border-color: #C0392B; }
  .salma .task-list  { border-color: #185FA5; }
  .haris .task-list  { border-color: #B07D2C; }
  .mashaer .task-list{ border-color: #534AB7; }
  .rashid .task-list { border-color: #0F6E56; }
  .muneera .task-list{ border-color: #C9A84C; }

  /* Task group */
  .task-group { display: flex; flex-direction: column; gap: 6px; }

  /* Task group label */
  .task-group-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 6px 6px; margin-top: 4px; border-top: 1px solid #F0EDE8; }
  .task-group:first-child .task-group-label { border-top: none; padding-top: 8px; margin-top: 0; }
  .task-group-label span.label-pill { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .ameen .label-pill   { background: rgba(192,57,43,0.1);  color: #C0392B; }
  .salma .label-pill   { background: rgba(24,95,165,0.1);  color: #185FA5; }
  .haris .label-pill   { background: rgba(176,125,44,0.1); color: #B07D2C; }
  .mashaer .label-pill { background: rgba(83,74,183,0.1);  color: #534AB7; }
  .rashid .label-pill  { background: rgba(15,110,86,0.1);  color: #0F6E56; }
  .muneera .label-pill { background: rgba(201,168,76,0.1); color: #9a7a20; }

  /* Task item */
  .task-item { background: #F8F6F3; border: 1px solid #ECEAE6; border-radius: 7px; padding: 12px 12px; font-size: 12px; color: #3a3835; line-height: 1.55; display: flex; align-items: flex-start; gap: 8px; }
  .task-dot { display: none; }
  .ameen .task-text::before   { background: #C0392B; }
  .salma .task-text::before   { background: #185FA5; }
  .haris .task-text::before   { background: #B07D2C; }
  .mashaer .task-text::before { background: #534AB7; }
  .rashid .task-text::before  { background: #0F6E56; }
  .muneera .task-text::before { background: #C9A84C; }
  .task-text::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; vertical-align: middle; position: relative; top: -1px; }
  .agent-col[dir="rtl"] .task-text::before { margin-right: 0; margin-left: 8px; }
  .ameen .task-dot  { background: #C0392B; }
  .salma .task-dot  { background: #185FA5; }
  .haris .task-dot  { background: #B07D2C; }
  .mashaer .task-dot{ background: #534AB7; }
  .rashid .task-dot { background: #0F6E56; }
  .muneera .task-dot{ background: #C9A84C; }
  .task-text { flex: 1; }

  /* High level view */
  .hl-groups { padding: 14px 12px 16px; background: #FFFFFF; border-left: 1px solid #E2E0DC; border-right: 1px solid #E2E0DC; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .ameen .hl-groups  { border-color: #C0392B; }
  .salma .hl-groups  { border-color: #185FA5; }
  .haris .hl-groups  { border-color: #B07D2C; }
  .mashaer .hl-groups{ border-color: #534AB7; }
  .rashid .hl-groups { border-color: #0F6E56; }
  .muneera .hl-groups{ border-color: #C9A84C; }
  .hl-pill { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.01em; }
  .ameen .hl-pill   { background: rgba(192,57,43,0.08);  color: #C0392B; }
  .salma .hl-pill   { background: rgba(24,95,165,0.08);  color: #185FA5; }
  .haris .hl-pill   { background: rgba(176,125,44,0.08); color: #B07D2C; }
  .mashaer .hl-pill { background: rgba(83,74,183,0.08);  color: #534AB7; }
  .rashid .hl-pill  { background: rgba(15,110,86,0.08);  color: #0F6E56; }
  .muneera .hl-pill { background: rgba(201,168,76,0.08); color: #9a7a20; }
  .hl-pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .ameen .hl-pill-dot   { background: #C0392B; }
  .salma .hl-pill-dot   { background: #185FA5; }
  .haris .hl-pill-dot   { background: #B07D2C; }
  .mashaer .hl-pill-dot { background: #534AB7; }
  .rashid .hl-pill-dot  { background: #0F6E56; }
  .muneera .hl-pill-dot { background: #C9A84C; }

  /* Card footer bar */
  .agent-card-footer { height: 6px; border-radius: 0 0 12px 12px; border: 1px solid; border-top: none; }
  .ameen .agent-card-footer  { border-color: #C0392B; background: #C0392B; }
  .salma .agent-card-footer  { border-color: #185FA5; background: #185FA5; }
  .haris .agent-card-footer  { border-color: #B07D2C; background: #B07D2C; }
  .mashaer .agent-card-footer{ border-color: #534AB7; background: #534AB7; }
  .rashid .agent-card-footer { border-color: #0F6E56; background: #0F6E56; }
  .muneera .agent-card-footer{ border-color: #C9A84C; background: #C9A84C; }

  /* RTL */
  .agent-col[dir="rtl"] .task-item { justify-content: flex-end; }
  .agent-col[dir="rtl"] .task-text { text-align: right; direction: rtl; }
  .agent-col[dir="rtl"] .task-group-label { direction: rtl; }
  .agent-col[dir="rtl"] .agent-summary { direction: rtl; }
  .agent-col[dir="rtl"] .task-group-label { text-align: right; }
  .agent-col[dir="rtl"] .agent-summary { text-align: right; border-left: 1px solid #E2E0DC; border-right: 3px solid; }
  .agent-col[dir="rtl"].ameen .agent-summary  { border-right-color: #C0392B; }
  .agent-col[dir="rtl"].salma .agent-summary  { border-right-color: #185FA5; }
  .agent-col[dir="rtl"].haris .agent-summary  { border-right-color: #B07D2C; }
  .agent-col[dir="rtl"].mashaer .agent-summary{ border-right-color: #534AB7; }
  .agent-col[dir="rtl"].rashid .agent-summary { border-right-color: #0F6E56; }
  .agent-col[dir="rtl"].muneera .agent-summary{ border-right-color: #C9A84C; }

  /* Detail page */
  #detail-page { display: none; position: fixed; top: 64px; left: 0; right: 0; bottom: 0; overflow-y: auto; background: #F0EDE8; z-index: 50; }
  #detail-inner { max-width: 860px; margin: 0 auto; padding: 40px; }

  .detail-back { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; margin-bottom: 32px; background: none; border: none; font-family: inherit; transition: color 0.15s; }
  .detail-back:hover { color: #3a3835; }
  .detail-back svg { width: 16px; height: 16px; }

  .detail-header { display: flex; align-items: center; gap: 20px; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid #E2E0DC; }
  .detail-photo-wrap { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid #E2E0DC; }
  .detail-photo { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .detail-agent-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .detail-agent-role { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; opacity: 0.45; margin-bottom: 8px; }
  .detail-agent-summary { font-size: 13px; color: #6a6865; line-height: 1.6; }

  .detail-group { margin-bottom: 32px; }
  .detail-group-label { margin-bottom: 12px; }
  .detail-group-label .label-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }

  .detail-task { background: #FFFFFF; border: 1px solid #E2E0DC; border-radius: 10px; margin-bottom: 10px; overflow: hidden; cursor: pointer; transition: box-shadow 0.15s; }
  .detail-task:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .detail-task-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; gap: 12px; }
  .detail-task-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .detail-task-title { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; line-height: 1.4; }
  .detail-task-chevron { width: 16px; height: 16px; color: #ccc; transition: transform 0.2s; flex-shrink: 0; }
  .detail-task.open .detail-task-chevron { transform: rotate(180deg); }

  .detail-task-body { display: none; padding: 0 16px 14px 36px; border-top: 1px solid #F0EDE8; }
  .detail-task.open .detail-task-body { display: block; }
  .detail-task-body ul { list-style: none; padding: 12px 0 0; display: flex; flex-direction: column; gap: 8px; }
  .detail-task-body li { font-size: 12px; color: #6a6865; line-height: 1.55; padding-left: 14px; position: relative; }
  .detail-task-body li::before { content: ""; position: absolute; left: 0; top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #D5D3CF; }

  /* Agent color overrides for detail page */
  #detail-page.ameen .detail-agent-name { color: #c96b63; }
  #detail-page.ameen .detail-photo-wrap { border-color: #C0392B; }
  #detail-page.ameen .label-pill { background: rgba(192,57,43,0.1); color: #C0392B; }
  #detail-page.ameen .detail-task-dot { background: #C0392B; }
  #detail-page.salma .detail-agent-name { color: #4a8fc7; }
  #detail-page.salma .detail-photo-wrap { border-color: #185FA5; }
  #detail-page.salma .label-pill { background: rgba(24,95,165,0.1); color: #185FA5; }
  #detail-page.salma .detail-task-dot { background: #185FA5; }
  #detail-page.haris .detail-agent-name { color: #c99a4a; }
  #detail-page.haris .detail-photo-wrap { border-color: #B07D2C; }
  #detail-page.haris .label-pill { background: rgba(176,125,44,0.1); color: #B07D2C; }
  #detail-page.haris .detail-task-dot { background: #B07D2C; }
  #detail-page.mashaer .detail-agent-name { color: #7b74d4; }
  #detail-page.mashaer .detail-photo-wrap { border-color: #534AB7; }
  #detail-page.mashaer .label-pill { background: rgba(83,74,183,0.1); color: #534AB7; }
  #detail-page.mashaer .detail-task-dot { background: #534AB7; }
  #detail-page.rashid .detail-agent-name { color: #2a9e7e; }
  #detail-page.rashid .detail-photo-wrap { border-color: #0F6E56; }
  #detail-page.rashid .label-pill { background: rgba(15,110,86,0.1); color: #0F6E56; }
  #detail-page.rashid .detail-task-dot { background: #0F6E56; }
  #detail-page.muneera .detail-agent-name { color: #b89a3a; }
  #detail-page.muneera .detail-photo-wrap { border-color: #C9A84C; }
  #detail-page.muneera .label-pill { background: rgba(201,168,76,0.1); color: #9a7a20; }
  #detail-page.muneera .detail-task-dot { background: #C9A84C; }
</style>
</head>

let currentLang = "en";
let currentTab = "detail";

function switchTab(tab) {
  currentTab = tab;
  document.getElementById("tab-detail").className = "tab-btn" + (tab === "detail" ? " active" : "");
  document.getElementById("tab-highlevel").className = "tab-btn" + (tab === "highlevel" ? " active" : "");
  render();
}

let currentOpenAgentId = null;

function toggleLang() {
  currentLang = currentLang === "en" ? "ar" : "en";
  document.documentElement.lang = currentLang;
  document.getElementById("lang-label-en").className = "lang-text " + (currentLang === "en" ? "lang-active" : "lang-inactive");
  document.getElementById("lang-label-ar").className = "lang-text " + (currentLang === "ar" ? "lang-active" : "lang-inactive");
  document.getElementById("topbar-title").textContent = currentLang === "ar" ? "RCMC - GTC نطاق العمال الرقميين" : "RCMC - GTC Digital Workers Scope";
  document.querySelectorAll(".agent-col").forEach(col => col.dir = currentLang === "ar" ? "rtl" : "ltr");
  // grid order stays fixed in both languages
  render();
  if (currentOpenAgentId) {
    openAgent(currentOpenAgentId);
  }
}

function openAgent(agentId) {
  const agent = AGENTS.find(a => a.id === agentId);
  if (!agent) return;
  currentOpenAgentId = agentId;
  const isAr = currentLang === "ar";
  const page = document.getElementById("detail-page");
  const inner = document.getElementById("detail-inner");
  page.className = agentId;
  page.dir = isAr ? "rtl" : "ltr";

  let html = "";
  html += "<button class='detail-back' onclick='closeAgent()'>";
  html += "<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M19 12H5M12 5l-7 7 7 7'/></svg>";
  html += isAr ? "العودة" : "Back";
  html += "</button>";

  const imgSrc = IMAGES[agent.id] || "";
  html += "<div class='detail-header'>";
  html += "<div class='detail-photo-wrap'><img class='detail-photo' src='" + imgSrc + "' alt='" + (isAr ? agent.nameAr : agent.name) + "'></div>";
  html += "<div>";
  html += "<div class='detail-agent-name'>" + (isAr ? agent.nameAr : agent.name) + "</div>";
  html += "<div class='detail-agent-role'>" + (isAr ? agent.roleAr : agent.role) + "</div>";
  html += "<div class='detail-agent-summary'>" + (isAr ? agent.summaryAr : agent.summary) + "</div>";
  html += "</div></div>";

  agent.groups.forEach(function(group) {
    html += "<div class='detail-group'>";
    const labelText = isAr && group.labelAr ? group.labelAr : group.label;
    html += "<div class='detail-group-label'><span class='label-pill'>" + labelText + "</span>";
    if (group.sublabel) html += "<span style='font-size:11px;color:#999;margin-left:8px;'>" + group.sublabel + "</span>";
    html += "</div>";

    group.tasks.forEach(function(task, ti) {
      const taskText = isAr ? task.ar : task.en;
      const hasDetails = task.details && task.details.length > 0;
      const taskId = agentId + "-" + group.label.replace(/ /g, "") + "-" + ti;

      html += "<div class='detail-task open' id='" + taskId + "'>";
      html += "<div class='detail-task-header'>";
      html += "<div class='detail-task-dot'></div>";
      html += "<div class='detail-task-title'>" + taskText + "</div>";
      html += "</div>";
      if (hasDetails) {
        html += "<div class='detail-task-body'><ul>";
        task.details.forEach(function(d) {
          const parts = d.split("|");
          const detailText = isAr && parts.length > 1 ? parts[1].trim() : parts[0].trim();
          html += "<li>" + detailText + "</li>";
        });
        html += "</ul></div>";
      }
      html += "</div>";
    });
    html += "</div>";
  });

  inner.innerHTML = html;
  page.style.display = "block";
  document.getElementById("canvas").style.display = "none";
}

function closeAgent() {
  currentOpenAgentId = null;
  document.getElementById("detail-page").style.display = "none";
  document.getElementById("canvas").style.display = "block";
}

function toggleTask(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle("open");
}

function render() {
  const board = document.getElementById("canvas-inner");
  board.innerHTML = "";
  const isAr = currentLang === "ar";

  const renderOrder = currentTab === "highlevel"
    ? ["ameen","muneera","haris","salma","rashid","mashaer"].map(function(id) { return AGENTS.find(function(a) { return a.id === id; }); })
    : AGENTS;

  renderOrder.forEach(function(agent) {
    const col = document.createElement("div");
    col.className = "agent-col " + agent.id;
    if (isAr) col.dir = "rtl";
    col.style.cursor = "pointer";
    col.onclick = function() { openAgent(agent.id); };

    const header = document.createElement("div");
    header.className = "agent-header";
    const imgSrc = IMAGES[agent.id] || "";
    header.innerHTML =
      "<div class='agent-photo-wrap'><img class='agent-photo' src='" + imgSrc + "' alt='" + (isAr ? agent.nameAr : agent.name) + "'></div>" +
      "<div class='agent-name'>" + (isAr ? agent.nameAr : agent.name) + "</div>" +
      "<div class='agent-role'>" + (isAr ? agent.roleAr : agent.role) + "</div>";
    col.appendChild(header);

    const summary = document.createElement("div");
    summary.className = "agent-summary";
    summary.textContent = isAr ? agent.summaryAr : agent.summary;
    col.appendChild(summary);

    const list = document.createElement("div");
    list.className = "task-list";

    if (currentTab === "highlevel") {
      const hlGroups = document.createElement("div");
      hlGroups.className = "hl-groups";
      agent.groups.forEach(function(group) {
        const pill = document.createElement("div");
        pill.className = "hl-pill";
        const dot = document.createElement("div");
        dot.className = "hl-pill-dot";
        const labelText = isAr && group.labelAr ? group.labelAr : group.label;
        const span = document.createElement("span");
        span.textContent = labelText;
        pill.appendChild(dot);
        pill.appendChild(span);
        hlGroups.appendChild(pill);
      });
      col.appendChild(hlGroups);
    } else {
      agent.groups.forEach(function(group) {
        const groupDiv = document.createElement("div");
        groupDiv.className = "task-group";

        const label = document.createElement("div");
        label.className = "task-group-label";
        const labelText = isAr && group.labelAr ? group.labelAr : group.label;
        label.innerHTML = "<span class='label-pill'>" + labelText + "</span>";
        if (group.sublabel) {
          label.innerHTML += "<span style='display:block;font-size:10px;font-weight:400;color:#888;text-transform:none;letter-spacing:0;margin-top:4px;padding-left:2px;'>" + group.sublabel + "</span>";
        }
        groupDiv.appendChild(label);

        group.tasks.forEach(function(task) {
          const item = document.createElement("div");
          item.className = "task-item";
          const text = document.createElement("div");
          text.className = "task-text";
          text.textContent = isAr ? task.ar : task.en;
          item.appendChild(text);
          groupDiv.appendChild(item);
        });

        list.appendChild(groupDiv);
      });
      col.appendChild(list);
    }

    const footer = document.createElement("div");
    footer.className = "agent-card-footer";
    col.appendChild(footer);

    board.appendChild(col);
  });
}


render();
</script>

<div id="detail-page">
  <div id="detail-inner"></div>
</div>
</body>
</html>
